<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .email-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .email-header {
            background-color: #f3811f;
            padding: 24px 32px;
            text-align: center;
        }

        .email-header h2 {
            margin: 0;
            color: #ffffff;
            font-size: 22px;
        }

        .email-body {
            padding: 32px;
            color: #333333;
            font-size: 15px;
            line-height: 1.6;
        }

        .email-button-wrapper {
            text-align: center;
            margin: 32px 0;
        }

        .email-button {
            background-color: #f3811f;
            color: white !important;
            padding: 14px 32px;
            text-decoration: none !important;
            border-radius: 6px;
            font-size: 16px;
            display: inline-block;
            font-weight: bold;
        }

        .email-note {
            color: #888888;
            font-size: 13px;
            margin: 4px 0;
        }

        .email-footer {
            background-color: #f9f9f9;
            padding: 16px 32px;
            text-align: center;
            border-top: 1px solid #eeeeee;
            color: #aaaaaa;
            font-size: 12px;
        }
    </style>
    <title></title>
</head>
<body>
    <div class="email-wrapper">

        <div class="email-header">
            <h2>Mila Salon za šišanje pasa 🐾</h2>
        </div>

        <div class="email-body">
            <p>Poštovani <strong>{{ profile_name }}</strong>,</p>
            <p>Hvala što ste se registrovali!</p>

            <p>Molimo vas da potvrdite vašu email adresu klikom na link ispod.</p>

            <div class="email-button-wrapper">
                <a href="{{ verification_url }}" class="email-button">
                    ☑️ Potvrdite email adresu
                </a>
            </div>

            <p class="email-note">Link je važeći 24 sata.</p>
            <p class="email-note">Ako se niste registrovali, ignorišite ovaj email.</p>
        </div>

        <div class="email-footer">
            <p>Vaš Mila Salon za šišanje pasa 🐾</p>
        </div>

    </div>
</body>
</html>
